name: Build and deploy to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v4

      - name: Configurar entorno Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias pesadas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Empaquetar la aplicación
        run: |
          zip -r release.zip . -x "venv/*" "__pycache__/*" ".git/*" "db/chroma/*"

      - name: Autenticar en Azure y Desplegar
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp deployment source config-zip \
              --resource-group rg-mercado24h-prod-alejhomoreno \
              --name app-mercado24h-final-alejhomoreno \
              --src release.zip
