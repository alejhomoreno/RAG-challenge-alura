name: Build and deploy to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v4

      - name: Configurar entorno Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias pesadas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Empaquetar la aplicación
        run: |
          zip -r release.zip . -x "venv/*" "__pycache__/*" ".git/*" "db/chroma/*"

      - name: Desplegar en Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-mercado24h-final-alejhomoreno'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
